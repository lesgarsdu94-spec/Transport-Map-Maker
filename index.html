<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HyperOS Subway Sim</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-panel">
        <h2 id="txt-title">Subway System</h2>
        
        <select id="lang-select" onchange="updateLanguage()">
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="zh">中文</option>
            <option value="ru">Русский</option>
            </select>

        <div id="controls">
            <label id="lbl-line">Line</label>
            <input type="text" id="line-input" value="M1 Blue">
            <input type="color" id="color-input" value="#0078ff">
        </div>

        <button id="btn-start" onclick="initSystem()">🚀 START TRIP</button>

        <div id="status-box">
            <span id="status-val">System Ready</span>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="lang.js"></script>
    <script src="main.js"></script>
</body>
</html>
<div id="map-container">
    <div id="map"></div>
                </div>
